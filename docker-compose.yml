version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: agile-ready-app
    ports:
      - "3000:3000"
    environment:
      # Koneksi ke container neo4j
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USERNAME=neo4j
      - NEO4J_PASSWORD=solidaritastimur
      - NEXTAUTH_SECRET=x12bgjydyjhjcghgc
      - NEXTAUTH_URL=http://localhost:3000
    depends_on:
      - neo4j
    networks:
      - agile-network
    restart: unless-stopped

  neo4j:
    image: neo4j:5
    container_name: agile-ready-db
    ports:
      # HTTP untuk Neo4j Browser
      - "7474:7474"
      # Bolt untuk koneksi aplikasi
      - "7687:7687"
    environment:
      - NEO4J_AUTH=neo4j/solidaritastimur
    volumes:
      - neo4j_data:/data
    networks:
      - agile-network
    restart: unless-stopped

volumes:
  neo4j_data:

networks:
  agile-network:
    driver: bridge
